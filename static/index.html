<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>semantic-search -- localhost:8000</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #1a1a1a;
    --sidebar: #1e1e1e;
    --main: #1a1a1a;
    --border: #2a2a2a;
    --green: #00ff88;
    --green-dim: #00cc6a;
    --orange: #ff8c00;
    --red: #ff4444;
    --yellow: #ffcc00;
    --text: #cccccc;
    --text-dim: #666666;
    --text-bright: #eeeeee;
    --miss-border: #cc4400;
    --hit-border: #00aa55;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Title Bar ── */
  .titlebar {
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 36px;
    background: #242424;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
    position: relative;
  }

  .titlebar-dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
  }
  .dot-red    { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green  { background: #28c840; }

  .titlebar-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  .status-badge {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid;
  }

  .status-online  { color: var(--green);  border-color: var(--green);  background: rgba(0,255,136,0.08); }
  .status-offline { color: var(--red);    border-color: var(--red);    background: rgba(255,68,68,0.08); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
    padding: 16px 0;
  }

  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 24px;
  }

  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .stat-box {
    background: #242424;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
  }

  .stat-num {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-num.green  { color: var(--green); }
  .stat-num.orange { color: var(--orange); }
  .stat-num.white  { color: var(--text-bright); }
  .stat-num.rate   { color: var(--green); font-size: 16px; }

  .stat-lbl {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* Threshold section */
  .threshold-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .threshold-limits {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .threshold-val {
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
  }

  .slider {
    width: 100%;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    outline: none;
    margin-bottom: 8px;
  }

  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--green);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,255,136,0.5);
  }

  .threshold-hint {
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  /* Actions */
  .flush-btn {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.15s;
  }

  .flush-btn:hover { background: rgba(255,68,68,0.1); }

  /* ── Main Area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Query bar */
  .query-bar {
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 44px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    flex-shrink: 0;
  }

  .prompt-arrow {
    color: var(--green);
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }

  .query-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 13px;
    caret-color: var(--green);
  }

  .query-input::placeholder { color: var(--text-dim); }

  .run-btn {
    padding: 6px 18px;
    background: var(--green);
    border: none;
    color: #000;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .run-btn:hover    { background: var(--green-dim); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Output area */
  .output {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .output::-webkit-scrollbar { width: 4px; }
  .output::-webkit-scrollbar-track { background: transparent; }
  .output::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* Result card */
  .result-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
    animation: fadeIn 0.2s ease;
  }

  .result-card.miss { border-color: var(--miss-border); }
  .result-card.hit  { border-color: var(--hit-border); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: #222;
    border-bottom: 1px solid var(--border);
  }

  .miss-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--orange);
  }

  .hit-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--green);
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
  }

  .card-meta .val { color: var(--text); }

  .card-body {
    padding: 14px;
    font-size: 12px;
    color: var(--text);
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 260px;
    overflow-y: auto;
    background: #1c1c1c;
  }

  /* Explain section */
  .explain-section {
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
    animation: fadeIn 0.25s ease 0.05s both;
  }

  .explain-header {
    padding: 8px 14px;
    background: #202020;
    border-bottom: 1px solid #2a2a2a;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .explain-table {
    width: 100%;
    border-collapse: collapse;
  }

  .explain-table tr {
    border-bottom: 1px solid #242424;
  }

  .explain-table tr:last-child { border-bottom: none; }

  .explain-table td {
    padding: 8px 14px;
    vertical-align: top;
    font-size: 12px;
  }

  .explain-table td:first-child {
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
    width: 140px;
    padding-top: 10px;
  }

  .explain-table td:last-child { color: var(--text); }

  /* Member bars */
  .member-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .member-row:last-child { margin-bottom: 0; }

  .member-label {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 46px;
  }

  .bar-track {
    flex: 1;
    height: 4px;
    background: #2a2a2a;
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .member-pct {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 44px;
    text-align: right;
  }

  /* Empty */
  .empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  /* Spinner */
  .spin {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid #333;
    border-top-color: var(--green);
    border-radius: 50%;
    animation: rotate 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes rotate { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Title bar -->
<div class="titlebar">
  <div class="titlebar-dots">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
  </div>
  <div class="titlebar-title">semantic-search -- localhost:8000</div>
  <div class="status-badge status-offline" id="statusBadge">OFFLINE</div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Cache Stats</div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-num green" id="statEntries">0</div>
          <div class="stat-lbl">Entries</div>
        </div>
        <div class="stat-box">
          <div class="stat-num white" id="statHits">0</div>
          <div class="stat-lbl">Hits</div>
        </div>
        <div class="stat-box">
          <div class="stat-num orange" id="statMisses">0</div>
          <div class="stat-lbl">Misses</div>
        </div>
        <div class="stat-box">
          <div class="stat-num rate" id="statRate">0.0%</div>
          <div class="stat-lbl">Hit Rate</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Similarity Threshold</div>
      <div class="threshold-limits">
        <span>0.50</span>
        <span id="threshVal" class="threshold-val">0.85</span>
        <span>1.00</span>
      </div>
      <input type="range" class="slider" id="threshSlider"
             min="0.5" max="1.0" step="0.01" value="0.85"
             oninput="updateThreshold(this.value)"/>
      <div class="threshold-hint">Queries above this reuse cached results</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Actions</div>
      <button class="flush-btn" onclick="flushCache()">Del Flush Cache</button>
    </div>

  </div>

  <!-- Main -->
  <div class="main">

    <!-- Query bar -->
    <div class="query-bar">
      <span class="prompt-arrow">&gt;</span>
      <input class="query-input" id="queryInput" type="text"
             placeholder="enter query…" autocomplete="off"/>
      <button class="run-btn" id="runBtn" onclick="doSearch()">RUN</button>
    </div>

    <!-- Output -->
    <div class="output" id="output">
      <div class="empty">waiting for query_</div>
    </div>

  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let currentThreshold = 0.85;

  // ── Status check ───────────────────────────────────────────────────────────
  async function checkStatus() {
    try {
      const r = await fetch(`${API}/health`);
      if (r.ok) {
        document.getElementById('statusBadge').textContent = 'ONLINE';
        document.getElementById('statusBadge').className = 'status-badge status-online';
      }
    } catch(e) {
      document.getElementById('statusBadge').textContent = 'OFFLINE';
      document.getElementById('statusBadge').className = 'status-badge status-offline';
    }
  }

  // ── Stats ──────────────────────────────────────────────────────────────────
  async function refreshStats() {
    try {
      const r = await fetch(`${API}/cache/stats`);
      const d = await r.json();
      document.getElementById('statEntries').textContent = d.total_entries;
      document.getElementById('statHits').textContent    = d.hit_count;
      document.getElementById('statMisses').textContent  = d.miss_count;
      document.getElementById('statRate').textContent    = (d.hit_rate * 100).toFixed(1) + '%';
    } catch(e) {}
  }

  // ── Threshold ──────────────────────────────────────────────────────────────
  function updateThreshold(val) {
    currentThreshold = parseFloat(val);
    document.getElementById('threshVal').textContent = currentThreshold.toFixed(2);
    fetch(`${API}/cache/threshold`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ threshold: currentThreshold })
    }).catch(() => {});
  }

  // ── Search ─────────────────────────────────────────────────────────────────
  async function doSearch() {
    const query = document.getElementById('queryInput').value.trim();
    if (!query) return;

    const btn = document.getElementById('runBtn');
    btn.disabled = true;

    const out = document.getElementById('output');
    out.innerHTML = `<div class="empty"><span class="spin"></span>running…</div>`;

    try {
      const [qRes, eRes] = await Promise.all([
        fetch(`${API}/query`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ query })
        }),
        fetch(`${API}/explain`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ query })
        })
      ]);

      const data    = await qRes.json();
      const explain = eRes.ok ? await eRes.json() : null;

      renderOutput(data, explain);
      await refreshStats();

    } catch(e) {
      out.innerHTML = `<div class="empty">⚠ cannot reach API — is uvicorn running?</div>`;
    }

    btn.disabled = false;
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderOutput(data, explain) {
    const isHit = data.cache_hit;
    const sim   = (data.similarity_score * 100).toFixed(1);
    const cls   = isHit ? 'hit' : 'miss';

    // Matched query row
    let matchedRow = '';
    if (isHit && data.matched_query) {
      matchedRow = `<div style="padding:8px 14px;background:#1e1e1e;border-bottom:1px solid #2a2a2a;font-size:11px;color:#666;">
        ↩ matched: <span style="color:#aaa">"${esc(data.matched_query)}"</span>
      </div>`;
    }

    const resultCard = `
      <div class="result-card ${cls}" style="margin-bottom:12px">
        <div class="card-header">
          <span class="${cls}-badge">★ ${isHit ? 'HIT' : 'MISS'}</span>
          <div class="card-meta">
            <span>cluster <span class="val">${data.dominant_cluster}</span></span>
            <span>sim <span class="val">${sim}%</span></span>
          </div>
        </div>
        ${matchedRow}
        <div class="card-body">${esc(data.result)}</div>
      </div>`;

    let explainHtml = '';
    if (explain) {
      explainHtml = renderExplain(explain);
    }

    document.getElementById('output').innerHTML = resultCard + explainHtml;
  }

  function renderExplain(ex) {
    const dist = ex.cluster_distribution || [];
    const dom  = ex.dominant_cluster;

    // Top members bar
    const indexed = dist.map((v,i) => [i,v]).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const barsHtml = indexed.map(([i, v]) => `
      <div class="member-row">
        <div class="member-label">clu-${i}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(v*100).toFixed(1)}%;${i===dom?'':'opacity:0.4'}"></div>
        </div>
        <div class="member-pct">${(v*100).toFixed(1)}%</div>
      </div>`).join('');

    const bestSim = ex.best_similarity !== null && ex.best_similarity !== undefined
      ? (ex.best_similarity * 100).toFixed(1) + '%'
      : 'none';

    return `
      <div class="explain-section">
        <div class="explain-header">Why This Result?</div>
        <table class="explain-table">
          <tr><td>Cluster</td><td>${ex.dominant_cluster}</td></tr>
          <tr><td>Checked</td><td>${ex.candidates_checked} candidates</td></tr>
          <tr><td>Threshold</td><td>${ex.threshold}</td></tr>
          <tr><td>Best Sim</td><td>${bestSim}</td></tr>
          <tr><td>Decision</td><td>${esc(ex.reasoning)}</td></tr>
          ${barsHtml ? `<tr><td>Members</td><td><div style="padding:2px 0">${barsHtml}</div></td></tr>` : ''}
        </table>
      </div>`;
  }

  // ── Flush ──────────────────────────────────────────────────────────────────
  async function flushCache() {
    await fetch(`${API}/cache`, { method: 'DELETE' }).catch(() => {});
    await refreshStats();
    document.getElementById('output').innerHTML = `<div class="empty">cache flushed_</div>`;
  }

  // ── Utils ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key
  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  // Init
  checkStatus();
  refreshStats();
  setInterval(() => { checkStatus(); refreshStats(); }, 5000);
</script>
</body>
</html>
