version: "3.9"

services:
  semantic-search:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist ChromaDB and generated data between container restarts
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      - ./embeddings:/app/embeddings
      - ./clustering_results:/app/clustering_results
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
